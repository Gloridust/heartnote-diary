name: memoirai
description: "声迹 MemoirAI — AI 驱动的对话式日记"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.2

  # 网络
  dio: ^5.7.0

  # 本地存储
  shared_preferences: ^2.3.2

  # 路由
  go_router: ^14.2.7

  # UI / 动效
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.69.0

  # 录音与权限
  record: ^5.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4

  # 工具
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
